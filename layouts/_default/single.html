{{ define "main" }}
  {{ .Scratch.Set "scope" "single" }}
  <article>
    <section class="flex flex-col max-w-full mt-0 prose dark:prose-invert lg:flex-row">
      <div class="min-w-0 min-h-0 max-w-fit">
        <div class="article-content max-w-prose mb-20">
          {{ .Content }}
        </div>
      </div>
    </section>
  </article>
{{ end }}
